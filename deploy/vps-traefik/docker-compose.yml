# -----------------------------------------------------------------------------
# Docker Compose — VPS + Traefik Production Deployment
# -----------------------------------------------------------------------------
# This compose file is intended for /opt/apps/zata-codes-template on a server
# that already runs host-level Traefik on an external Docker network.
#
# Required files beside this compose file:
#   - .env      deployment metadata: DOMAIN, TRAEFIK_NETWORK, image refs
#   - app.env   runtime secrets and application configuration
#
# Bring up:
#   docker compose up -d
#
# Backups, S3 diagnostics, and VPS provisioning have moved to the standalone
# `zata-ops` CLI; install it and schedule `zata-ops db backup` externally.
# -----------------------------------------------------------------------------

services:
  zata-codes-template-backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE in .env}
    pull_policy: always
    expose:
      - "8000"
    env_file:
      - app.env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - zata-codes-template-backend-logs:/app/backend/logs
      - zata-codes-template-backend-data:/app/backend/data
    networks:
      - traefik
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "0.25"
          memory: 512M

  zata-codes-template-admin:
    image: ${ADMIN_IMAGE:?Set ADMIN_IMAGE in .env}
    pull_policy: always
    expose:
      - "80"
    depends_on:
      zata-codes-template-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      - "traefik.http.middlewares.zata-codes-template-admin-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.zata-codes-template-admin-web.rule=Host(`admin.${DOMAIN:?Set DOMAIN in .env}`)"
      - "traefik.http.routers.zata-codes-template-admin-web.entrypoints=web"
      - "traefik.http.routers.zata-codes-template-admin-web.middlewares=zata-codes-template-admin-https-redirect"
      - "traefik.http.routers.zata-codes-template-admin.rule=Host(`admin.${DOMAIN:?Set DOMAIN in .env}`)"
      - "traefik.http.routers.zata-codes-template-admin.entrypoints=websecure"
      - "traefik.http.routers.zata-codes-template-admin.tls=true"
      - "traefik.http.routers.zata-codes-template-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.zata-codes-template-admin.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.125"
          memory: 64M

  zata-codes-template-public:
    image: ${PUBLIC_IMAGE:?Set PUBLIC_IMAGE in .env}
    pull_policy: always
    expose:
      - "3000"
    env_file:
      - app.env
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://zata-codes-template-backend:8000}
    depends_on:
      zata-codes-template-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      - "traefik.http.middlewares.zata-codes-template-public-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.zata-codes-template-public-web.rule=Host(`${DOMAIN:?Set DOMAIN in .env}`)"
      - "traefik.http.routers.zata-codes-template-public-web.entrypoints=web"
      - "traefik.http.routers.zata-codes-template-public-web.middlewares=zata-codes-template-public-https-redirect"
      - "traefik.http.routers.zata-codes-template-public.rule=Host(`${DOMAIN:?Set DOMAIN in .env}`)"
      - "traefik.http.routers.zata-codes-template-public.entrypoints=websecure"
      - "traefik.http.routers.zata-codes-template-public.tls=true"
      - "traefik.http.routers.zata-codes-template-public.tls.certresolver=letsencrypt"
      - "traefik.http.services.zata-codes-template-public.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.125"
          memory: 64M

volumes:
  zata-codes-template-backend-logs:
  zata-codes-template-backend-data:

networks:
  traefik:
    name: ${TRAEFIK_NETWORK:-traefik}
    external: true
