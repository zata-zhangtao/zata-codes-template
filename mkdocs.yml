site_name: zata-codes-template

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy

plugins:
  - search
  - git-revision-date-localized:
      fallback_to_build_date: true
      strict: false
      type: date
      locale: zh
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            members_order: source
            show_source: false
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed

extra_javascript:
  - https://unpkg.com/mermaid@10.6.1/dist/mermaid.min.js
  - javascripts/mermaid.js

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - 使用指南:
      - 配置说明: guides/configuration.md
      - 部署指南: guides/deployment.md
      - PRD 编写规范: guides/prd-standard.md
  - 核心概念:
      - Prompt 工程: core/prompt_engineering.md
  - 数据库:
      - Schema 设计: database/schema.md
      - 迁移规范: database/migrations.md
  - API 参考:
      - 模块引用: api/references.md
  - 系统架构:
      - 架构设计: architecture/system-design.md
  - 开发者:
      - 评测与测试: dev/evaluation.md
