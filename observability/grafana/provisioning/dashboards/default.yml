# -----------------------------------------------------------------------------
# Grafana dashboard provider provisioning.
#
# Loads all JSON dashboards placed in /var/lib/grafana/dashboards at startup.
# -----------------------------------------------------------------------------

apiVersion: 1

providers:
  - name: default
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
