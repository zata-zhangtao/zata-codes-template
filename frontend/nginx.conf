server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS is resolved at runtime so Nginx survives backend container rebuilds.
    resolver 127.0.0.11 ipv6=off valid=5s;
    set $backend_upstream backend:8000;

    # /api/* → 后端服务
    location /api/ {
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny common scanner probes
    location ~* /\.(env|env\..*|git|vscode|ssh|aws|docker|htaccess|htpasswd)$ {
        return 404;
    }

    location ~* \.(axd|php|jsp|asp|aspx)$ {
        return 404;
    }

    location ~* ^/(actuator|telescope|debug|trace|\.well-known/security\.txt|info\.php|config\.json|wp-json|rest_route|s/.*/META-INF|graphql/api|api/gql|@vite/env)$ {
        return 404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
