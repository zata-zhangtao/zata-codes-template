# -----------------------------------------------------------------------------
# Docker Compose — Dokploy Production Deployment
# -----------------------------------------------------------------------------
# Usage:
#   Deploy via Dokploy UI by pointing it to this compose file.
#
# Prerequisites:
#   1. Set DOMAIN in Dokploy environment (e.g. app.example.com).
#   2. Set DATABASE_URL to your production database.
#   3. Ensure "dokploy-network" exists (Dokploy creates it).
#
# Traefik labels route traffic to the frontend (Nginx). DOMAIN must be set in
# the Dokploy Compose environment; otherwise Docker Compose fails early instead
# of generating Host(``) routes that return Traefik 404.
# -----------------------------------------------------------------------------

services:
  zata-codes-template-backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    expose:
      - "8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=${DATABASE_URL}
      - API_SECRET_KEY
      - ADMIN_IDENTIFIER
      - ADMIN_PASSWORD_HASH
      - OPENAI_API_KEY
      - DASHSCOPE_API_KEY
      - DEEPSEEK_API_KEY
      - OPENROUTER_API_KEY
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - zata-codes-template-backend-logs:/app/backend/logs
      - zata-codes-template-backend-data:/app/backend/data
    networks:
      - dokploy-network
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "0.25"
          memory: 512M

  zata-codes-template-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      zata-codes-template-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.middlewares.app-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.app-web.rule=Host(`${DOMAIN:?Set DOMAIN in Dokploy environment}`)"
      - "traefik.http.routers.app-web.entrypoints=web"
      - "traefik.http.routers.app-web.middlewares=app-https-redirect"
      - "traefik.http.routers.app.rule=Host(`${DOMAIN:?Set DOMAIN in Dokploy environment}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.125"
          memory: 64M

  zata-codes-template-backup:
    build:
      context: .
      dockerfile: scripts/backup_service/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-app-backups}
      - S3_PREFIX=${S3_PREFIX:-app-backups}
      - S3_ADDRESSING_STYLE=${S3_ADDRESSING_STYLE:-path}
      - BACKUP_TIME=${BACKUP_TIME:-18:00}
      - FULL_BACKUP_DAY=${FULL_BACKUP_DAY:-6}
      - LOGS_DIR=/app/backend/logs
      - RESOURCES_DIR=/app/backend/data
      - WORK_DIR=/tmp/backups
      - RETENTION_DAYS=${RETENTION_DAYS:-30}
    volumes:
      - zata-codes-template-backend-logs:/app/backend/logs:ro
      - zata-codes-template-backend-data:/app/backend/data:ro
      - zata-codes-template-backup-work:/tmp/backups
    restart: unless-stopped
    networks:
      - dokploy-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.125"
          memory: 128M

volumes:
  zata-codes-template-backend-logs:
  zata-codes-template-backend-data:
  zata-codes-template-backup-work:

networks:
  dokploy-network:
    external: true
