# -----------------------------------------------------------------------------
# Docker Compose — Dokploy Production Deployment
# -----------------------------------------------------------------------------
# Usage:
#   Deploy via Dokploy UI by pointing it to this compose file.
#
# Prerequisites:
#   1. Set DOMAIN in Dokploy environment (e.g. app.example.com).
#   2. Set DATABASE_URL to your production database.
#   3. Ensure "dokploy-network" exists (Dokploy creates it).
#
# Traefik labels route traffic to the admin frontend (Nginx). DOMAIN must be set in
# the Dokploy Compose environment; otherwise Docker Compose fails early instead
# of generating Host(``) routes that return Traefik 404.
#
# Backups, S3 diagnostics, and VPS provisioning have moved to the standalone
# `zata-ops` CLI; schedule `zata-ops db backup` externally (Dokploy Scheduled
# Job, cron, GitHub Actions, etc.).
# -----------------------------------------------------------------------------

services:
  zata-codes-template-backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    expose:
      - "8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL
      - AUTH_ADMIN_BOOTSTRAP_USERNAME
      - AUTH_ADMIN_BOOTSTRAP_PASSWORD
      - APP_BOOTSTRAP_EMAIL
      - APP_BOOTSTRAP_PASSWORD
      - OPENAI_API_KEY
      - DASHSCOPE_API_KEY
      - DEEPSEEK_API_KEY
      - OPENROUTER_API_KEY
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - zata-codes-template-backend-logs:/app/backend/logs
      - zata-codes-template-backend-data:/app/backend/data
    networks:
      - dokploy-network
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "0.25"
          memory: 512M

  zata-codes-template-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      zata-codes-template-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.middlewares.app-admin-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.app-admin-web.rule=Host(`admin.${DOMAIN:?Set DOMAIN in Dokploy environment}`)"
      - "traefik.http.routers.app-admin-web.entrypoints=web"
      - "traefik.http.routers.app-admin-web.middlewares=app-admin-https-redirect"
      - "traefik.http.routers.app-admin.rule=Host(`admin.${DOMAIN:?Set DOMAIN in Dokploy environment}`)"
      - "traefik.http.routers.app-admin.entrypoints=websecure"
      - "traefik.http.routers.app-admin.tls=true"
      - "traefik.http.routers.app-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.app-admin.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.125"
          memory: 64M

  zata-codes-template-public:
    build:
      context: ./frontend-public
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://zata-codes-template-backend:8000}
    depends_on:
      zata-codes-template-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.middlewares.app-public-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.app-public-web.rule=Host(`${DOMAIN:?Set DOMAIN in Dokploy environment}`)"
      - "traefik.http.routers.app-public-web.entrypoints=web"
      - "traefik.http.routers.app-public-web.middlewares=app-public-https-redirect"
      - "traefik.http.routers.app-public.rule=Host(`${DOMAIN:?Set DOMAIN in Dokploy environment}`)"
      - "traefik.http.routers.app-public.entrypoints=websecure"
      - "traefik.http.routers.app-public.tls=true"
      - "traefik.http.routers.app-public.tls.certresolver=letsencrypt"
      - "traefik.http.services.app-public.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.125"
          memory: 64M

volumes:
  zata-codes-template-backend-logs:
  zata-codes-template-backend-data:

networks:
  dokploy-network:
    external: true
