target-version = "py311"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "F",    # Pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "W",    # pycodestyle warnings
    # pydocstyle - docstring presence (the enforcement we care about)
    "D100", "D101", "D102", "D103", "D104", "D105", "D106", "D107",
    # pydocstyle - docstring quality
    "D419",
]
ignore = [
    # Conflicting rules: keep D211 (no blank line before class) and D212 (summary first line).
    "D203",
    "D213",
    # D400/D401/D403 are English-grammar oriented and clash with Chinese docstrings.
    "D400", "D401", "D403",
]

[lint.pydocstyle]
convention = "google"

[lint.per-file-ignores]
"tests/**/*.py" = ["D100", "D103", "D104"]
"alembic/versions/*.py" = ["D", "E501"]
"src/backend/infrastructure/persistence/models/__init__.py" = ["D104"]
# System skill scripts contain long template strings and JSON-mapped camelCase fields.
"skills/.system/**/*.py" = ["E501", "N815"]
"scripts/build/build_whats_new_manifest.py" = ["N815"]
