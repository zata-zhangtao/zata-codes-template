# -----------------------------------------------------------------------------
# Docker Compose — Local Development
# -----------------------------------------------------------------------------
# 数据库模式：
#   - 本地模式（默认）：启动本地 PostgreSQL 容器
#   - 远程模式：.env 中配置 DATABASE_URL 时，backend 直接连接远程数据库
#
# 备份/S3 诊断/VPS 初始化能力已迁出到独立 CLI `zata-ops`。安装方式：
#   cd /path/to/zata-ops && uv tool install --force .
#   zata-ops db backup --dry-run
# -----------------------------------------------------------------------------
# Usage:
#   docker compose up --build
# -----------------------------------------------------------------------------

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zata-codes-template-backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
      - path: ${COMPOSE_LOCAL_ENV_FILE:-.env.local}
        required: false
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://app:app@db:5432/app}
      - API_SECRET_KEY=${API_SECRET_KEY}
      - ADMIN_IDENTIFIER=${ADMIN_IDENTIFIER:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - zata-codes-template-backend-logs:/app/backend/logs
      - zata-codes-template-backend-data:/app/backend/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Worker (uncomment if the project has async background tasks).
  #
  # Reuses the backend image with a different command. If you uncomment this,
  # ALSO add an equivalent service to docker-compose.dokploy.yml — the
  # tests/repo/test_compose_parity.py check will fail otherwise.
  # ---------------------------------------------------------------------------
  # zata-codes-template-worker:
  #   build:
  #     context: .
  #     dockerfile: src/backend/Dockerfile
  #   command: ["python", "-m", "backend.workers.<your_worker_module>"]
  #   env_file:
  #     - path: .env
  #       required: false
  #     - path: ${COMPOSE_LOCAL_ENV_FILE:-.env.local}
  #       required: false
  #   environment:
  #     - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://app:app@db:5432/app}
  #     - DB_MIGRATION_MODE=skip
  #     # Mirror any other env keys the backend service receives.
  #   volumes:
  #     - zata-codes-template-backend-logs:/app/backend/logs
  #     - zata-codes-template-backend-data:/app/backend/data
  #   depends_on:
  #     zata-codes-template-backend:
  #       condition: service_healthy
  #   restart: unless-stopped

  zata-codes-template-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      zata-codes-template-backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  zata-codes-template-backend-logs:
  zata-codes-template-backend-data:
