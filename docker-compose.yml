# -----------------------------------------------------------------------------
# Docker Compose — Local Development
# -----------------------------------------------------------------------------
# 数据库模式：
#   - 本地模式（默认）：启动本地 PostgreSQL 容器
#   - 远程模式：.env 中配置 DATABASE_URL 时，backend 直接连接远程数据库
# -----------------------------------------------------------------------------
# Usage:
#   docker compose up --build
# -----------------------------------------------------------------------------

services:
  db:
    image: postgres:17-alpine
    container_name: app-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    container_name: app-backend
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://app:app@db:5432/app}
      - API_SECRET_KEY=${API_SECRET_KEY}
      - ADMIN_IDENTIFIER=${ADMIN_IDENTIFIER:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
    volumes:
      - backend-logs:/app/backend/logs
      - backend-data:/app/backend/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: app-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backup:
    build:
      context: .
      dockerfile: scripts/backup_service/Dockerfile
    container_name: app-backup
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://app:app@db:5432/app}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-app-backups}
      - S3_PREFIX=${S3_PREFIX:-app-backups}
      - BACKUP_TIME=${BACKUP_TIME:-18:00}
      - FULL_BACKUP_DAY=${FULL_BACKUP_DAY:-6}
      - LOGS_DIR=/app/backend/logs
      - RESOURCES_DIR=/app/backend/data
      - WORK_DIR=/tmp/backups
      - RETENTION_DAYS=${RETENTION_DAYS:-30}
    volumes:
      - backend-logs:/app/backend/logs:ro
      - backend-data:/app/backend/data:ro
      - backup-work:/tmp/backups
    profiles:
      - backup
    restart: unless-stopped

volumes:
  postgres-data:
  backend-logs:
  backend-data:
  backup-work:
