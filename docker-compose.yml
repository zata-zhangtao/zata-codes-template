# -----------------------------------------------------------------------------
# Docker Compose — Local Development
# -----------------------------------------------------------------------------
# 本地开发不再内置 PostgreSQL 容器。请在 .env / .env.local 中配置 DATABASE_URL
# 指向已运行的数据库（例如本地 Postgres、远程 RDS 或宿主机
# host.docker.internal:5432）。
#
# 备份/S3 诊断/VPS 初始化能力已迁出到独立 CLI `zata-ops`。安装方式：
#   cd /path/to/zata-ops && uv tool install --force .
#   zata-ops db backup --dry-run
# -----------------------------------------------------------------------------
# Usage:
#   docker compose up --build
# -----------------------------------------------------------------------------

services:
  zata-codes-template-backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
      - path: ${COMPOSE_LOCAL_ENV_FILE:-.env.local}
        required: false
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=${DATABASE_URL}
      - API_SECRET_KEY=${API_SECRET_KEY}
      - ADMIN_IDENTIFIER=${ADMIN_IDENTIFIER:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - REDIS_URL=${REDIS_URL}
      - AUTH_ADMIN_BOOTSTRAP_USERNAME=${AUTH_ADMIN_BOOTSTRAP_USERNAME:-}
      - AUTH_ADMIN_BOOTSTRAP_PASSWORD=${AUTH_ADMIN_BOOTSTRAP_PASSWORD:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - zata-codes-template-backend-logs:/app/logs
      - zata-codes-template-backend-data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.docker.compose.project=zata-codes-template"
      - "com.docker.compose.service=backend"

  # ---------------------------------------------------------------------------
  # Worker (uncomment if the project has async background tasks).
  #
  # Reuses the backend image with a different command. If you uncomment this,
  # ALSO add an equivalent service to docker-compose.dokploy.yml — the
  # tests/repo/test_compose_parity.py check will fail otherwise.
  # ---------------------------------------------------------------------------
  # zata-codes-template-worker:
  #   build:
  #     context: .
  #     dockerfile: src/backend/Dockerfile
  #   command: ["python", "-m", "backend.workers.<your_worker_module>"]
  #   env_file:
  #     - path: .env
  #       required: false
  #     - path: ${COMPOSE_LOCAL_ENV_FILE:-.env.local}
  #       required: false
  #   environment:
  #     - DATABASE_URL=${DATABASE_URL}
  #     - DB_MIGRATION_MODE=skip
  #     # Mirror any other env keys the backend service receives.
  #   volumes:
  #     - zata-codes-template-backend-logs:/app/backend/logs
  #     - zata-codes-template-backend-data:/app/backend/data
  #   depends_on:
  #     zata-codes-template-backend:
  #       condition: service_healthy
  #   restart: unless-stopped

  zata-codes-template-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      zata-codes-template-backend:
        condition: service_healthy
    restart: unless-stopped

  zata-codes-template-public:
    build:
      context: ./frontend-public
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
      - path: ${COMPOSE_LOCAL_ENV_FILE:-.env.local}
        required: false
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://localhost:8000}
    depends_on:
      zata-codes-template-backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  zata-codes-template-backend-logs:
  zata-codes-template-backend-data:
