# A generic, single database configuration.

[alembic]
# path to migration scripts.
script_location = %(here)s/alembic

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

# The path separator for version_locations and prepend_sys_path.
path_separator = os

# database URL is resolved dynamically by env.py;
# this value is intentionally left empty.
sqlalchemy.url =

# Filename template for newly generated revisions, e.g.
#   20260617-153045-add-user-email-index.py
# Drop the default 12-char hash segment so filenames stay readable;
# uniqueness is still guaranteed by the `revision` variable inside the file.
# See docs/database/migrations.md for slug rules.
file_template = %%(year)d%%(month).2d%%(day).2d-%%(hour).2d%%(minute).2d%%(second).2d-%%(slug)s


[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
